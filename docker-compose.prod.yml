services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio_user} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - portfolio-network
    mem_limit: 256m
    memswap_limit: 256m

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: portfolio-backend-prod
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-portfolio}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-portfolio_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?error}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:?error}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - portfolio-network
    mem_limit: 512m
    memswap_limit: 512m

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: portfolio-frontend-prod
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - portfolio-network
    mem_limit: 128m
    memswap_limit: 128m

volumes:
  postgres_data:

networks:
  portfolio-network:
    driver: bridge
